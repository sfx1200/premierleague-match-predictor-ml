version: "3.9"

services:
  # Run the full pipeline (data → features → train → evaluate)
  pipeline:
    build: .
    command: python run_pipeline.py
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
    environment:
      - FOOTBALL_DATA_API_KEY=${FOOTBALL_DATA_API_KEY:-}

  # FastAPI prediction service
  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
    environment:
      - FOOTBALL_DATA_API_KEY=${FOOTBALL_DATA_API_KEY:-}
    depends_on:
      pipeline:
        condition: service_completed_successfully

  # Streamlit dashboard
  dashboard:
    build: .
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    depends_on:
      pipeline:
        condition: service_completed_successfully
